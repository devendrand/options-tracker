services:
  db:
    image: postgres:16-alpine
    container_name: ot-db-qa
    env_file: .env.qa
    volumes:
      - postgres_data_qa:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ot-backend-qa
    env_file: .env.qa
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: nginx
    container_name: ot-frontend-qa
    env_file: .env.qa
    ports:
      - "${FRONTEND_PORT:-4300}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  default:
    name: ot-network-qa

volumes:
  postgres_data_qa:
