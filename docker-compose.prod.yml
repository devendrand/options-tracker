services:
  db:
    image: postgres:16-alpine
    container_name: ot-db-prod
    env_file: .env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ot-backend-prod
    env_file: .env.prod
    ports:
      - "${BACKEND_PORT:-8200}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: nginx
    container_name: ot-frontend-prod
    env_file: .env.prod
    ports:
      - "${FRONTEND_PORT:-4400}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  default:
    name: ot-network-prod

volumes:
  postgres_data_prod:
